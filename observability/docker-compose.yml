name: observability

services:
  grafana:
    image: grafana/grafana-oss:latest
    depends_on:
      - prometheus
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - observability

  prometheus:
    image: prom/prometheus:latest
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        sed "s#__OBSERVABILITY_METRICS_TARGET__#${OBSERVABILITY_METRICS_TARGET:-observability-test-runner:9464}#g" \
          /etc/prometheus/prometheus.yml.tmpl > /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.tmpl:ro
      - prometheus_data:/prometheus
    networks:
      - observability

  loki:
    image: grafana/loki:latest
    command:
      - "-config.file=/etc/loki/config.yml"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ./test/logs:/var/observability/test/logs:ro
    networks:
      - observability
    # Local smoke-test logs are scraped from /var/observability/test/logs.

  observability-test-runner:
    build:
      context: ./test
      dockerfile: Dockerfile
    profiles:
      - test
    command:
      - sleep
      - infinity
    working_dir: /workspace/observability/test
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-observability-local}
      POETRY_VIRTUALENVS_CREATE: "false"
    volumes:
      - ..:/workspace
    networks:
      - observability

  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    command: >-
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
      - MLFLOW_SERVE_ARTIFACTS=true
      - MLFLOW_ALLOWED_HOSTS=mlflow,mlflow:5000,localhost,localhost:5000
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 45s
      timeout: 30s
      retries: 3
      start_period: 59s
    networks:
      - observability

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  mlflow_data:

networks:
  observability:
    driver: bridge