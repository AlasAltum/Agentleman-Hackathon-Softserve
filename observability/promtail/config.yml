server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: observability_test_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: observability-test-logs
          service: observability-test
          source: test-log-file
          __path__: /var/observability/test/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            component: component
            phase: phase
            status: status
      - labels:
          level:
          service:
          component:
          phase:
          status: