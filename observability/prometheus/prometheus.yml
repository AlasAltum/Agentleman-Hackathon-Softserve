global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          service: observability-prometheus

  - job_name: observability_test_metrics
    metrics_path: /metrics
    static_configs:
      # Use port 9464 to avoid colliding with the frontend.
      # The concrete target is injected by docker-compose at container startup.
      - targets:
          - __OBSERVABILITY_METRICS_TARGET__
        labels:
          service: observability-test
          component: metrics-emitter

  # The observability test emitter target becomes UP once the local
  # emit_metrics.py smoke-test script is implemented and running on port 9464.