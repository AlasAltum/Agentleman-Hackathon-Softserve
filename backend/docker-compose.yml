services:
  db:
    image: postgres:15-alpine
    container_name: hackaton-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_BDNAME}
    command: -p ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hackaton-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./src/qdrant/qdrant_storage:/qdrant/storage:z

  app:
    build: .
    container_name: hackaton-backend
    depends_on:
      - db
      - qdrant
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_BDNAME}"
      QDRANT_URL: "http://qdrant:6333"
      APP_ENV: ${APP_ENV:-prod}
      APP_PORT: ${APP_PORT}
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "${EXPOSED_APP_PORT}:${APP_PORT}"